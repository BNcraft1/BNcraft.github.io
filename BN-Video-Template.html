<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BN Mod Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;background:#07101f;
  background-image:radial-gradient(ellipse at 15% 60%,rgba(0,100,220,.13) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(0,180,255,.09) 0%,transparent 50%);
  display:flex;flex-direction:column;align-items:center;
  padding:36px 20px 60px;font-family:'Rajdhani',sans-serif;color:#dff2ff;
}
h1{
  font-family:'Orbitron',monospace;font-size:1.9rem;font-weight:900;
  background:linear-gradient(135deg,#00d4ff,#0077ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:5px;text-transform:uppercase;
  filter:drop-shadow(0 0 18px rgba(0,180,255,.55));margin-bottom:6px;
}
.sub{color:rgba(0,200,255,.5);font-size:.9rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px}
.wrap{display:flex;gap:36px;max-width:1260px;width:100%;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.panel{
  background:rgba(0,25,60,.85);border:1px solid rgba(0,140,255,.3);
  border-radius:16px;padding:28px;width:350px;flex-shrink:0;
  box-shadow:0 0 40px rgba(0,90,255,.14),inset 0 1px 0 rgba(255,255,255,.04);
}
.panel-title{
  font-family:'Orbitron',monospace;font-size:.78rem;color:#00d4ff;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:22px;
  padding-bottom:10px;border-bottom:1px solid rgba(0,140,255,.2);
}
.field{margin-bottom:18px}
.field label{
  display:block;font-size:.75rem;color:rgba(0,200,255,.65);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;font-weight:700;
}
.field input{
  width:100%;background:rgba(0,15,40,.9);border:1px solid rgba(0,130,255,.3);
  border-radius:8px;padding:9px 13px;color:#dff2ff;
  font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:600;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:rgba(0,195,255,.6);box-shadow:0 0 10px rgba(0,140,255,.2)}
.upload-zone{
  width:100%;aspect-ratio:16/9;background:rgba(0,15,40,.9);border:2px dashed rgba(0,130,255,.4);
  border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .25s;position:relative;overflow:hidden;
}
.upload-zone:hover{border-color:rgba(0,200,255,.7);background:rgba(0,35,80,.6)}
.upload-zone .ico{font-size:1.8rem;margin-bottom:6px;opacity:.55}
.upload-zone span{font-size:.72rem;color:rgba(0,195,255,.45);letter-spacing:1px;text-transform:uppercase}
.upload-zone img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
#fileInput{display:none}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag-btn{
  padding:7px 10px;background:rgba(0,15,40,.9);border:1px solid rgba(0,130,255,.28);
  border-radius:6px;color:rgba(0,195,255,.45);font-family:'Rajdhani',sans-serif;
  font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;
  letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;
}
.tag-btn.on{background:rgba(0,90,190,.4);border-color:rgba(0,195,255,.7);color:#00d4ff;box-shadow:0 0 9px rgba(0,140,255,.3)}
.divider{height:1px;background:rgba(0,130,255,.18);margin:14px 0}
.btn-gen{
  width:100%;padding:13px;margin-top:6px;
  background:linear-gradient(135deg,#005ccc,#0099ff);border:none;border-radius:10px;
  color:#fff;font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;
  box-shadow:0 4px 18px rgba(0,90,255,.4);
}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,140,255,.5)}
.btn-dl{
  width:100%;padding:11px;margin-top:9px;
  background:rgba(0,25,55,.85);border:1px solid rgba(0,195,90,.4);
  border-radius:10px;color:#00ff88;font-family:'Orbitron',monospace;
  font-size:.75rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:all .3s;display:none;
}
.btn-dl:hover{background:rgba(0,70,35,.4);border-color:rgba(0,240,90,.7);box-shadow:0 0 18px rgba(0,190,70,.3)}
.status-bar{font-size:.76rem;color:rgba(0,200,255,.55);letter-spacing:1px;margin-top:8px;text-align:center;min-height:18px}
.status-bar.ok{color:#00ff88}.status-bar.err{color:#ff4466}
.preview{flex:1;min-width:300px;display:flex;flex-direction:column;align-items:center;gap:14px}
.preview-label{font-family:'Orbitron',monospace;font-size:.78rem;color:rgba(0,195,255,.45);letter-spacing:3px;text-transform:uppercase}
.placeholder{
  width:100%;max-width:580px;aspect-ratio:1/1;
  background:rgba(0,15,45,.6);border:1px solid rgba(0,130,255,.18);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:rgba(0,140,255,.3);font-size:.8rem;letter-spacing:2px;text-transform:uppercase;
}
canvas{max-width:100%;border-radius:12px;box-shadow:0 0 55px rgba(0,90,255,.28),0 18px 55px rgba(0,0,0,.5);display:none}

/* ══ MODAL ══ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,5,20,.9);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;z-index:1000;
  animation:fadeIn .18s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:linear-gradient(160deg,#0b1e4a,#0e2860);
  border:1px solid rgba(0,150,255,.4);border-radius:20px;
  width:min(520px,95vw);overflow:hidden;
  box-shadow:0 0 80px rgba(0,100,255,.25),0 30px 80px rgba(0,0,0,.5);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px 16px;border-bottom:1px solid rgba(0,130,255,.2);
}
.modal-head span{font-family:'Orbitron',monospace;font-size:.9rem;color:#00d4ff;letter-spacing:3px;text-transform:uppercase}
.modal-close{
  background:rgba(255,50,50,.15);border:1px solid rgba(255,80,80,.3);
  color:#ff7070;border-radius:8px;padding:5px 11px;cursor:pointer;font-size:1rem;
  transition:all .2s;font-family:'Rajdhani',sans-serif;font-weight:700;
}
.modal-close:hover{background:rgba(255,50,50,.3)}
.modal-body{padding:22px 24px 28px}
.section-label{font-size:.68rem;color:rgba(0,195,255,.45);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:700;}
.format-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.fmt-btn{
  padding:11px 18px;border-radius:9px;font-family:'Orbitron',monospace;
  font-size:.7rem;font-weight:700;letter-spacing:2px;cursor:pointer;
  transition:all .25s;text-transform:uppercase;border:1px solid;min-width:95px;text-align:center;
}
.fmt-btn.ok{background:rgba(0,50,120,.6);border-color:rgba(0,160,255,.5);color:#60d0ff}
.fmt-btn.ok:hover{background:rgba(0,80,180,.6);border-color:rgba(0,210,255,.8);color:#fff;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,140,255,.4)}
.fmt-btn.no{background:rgba(30,30,40,.4);border-color:rgba(80,80,100,.3);color:rgba(120,130,150,.4);cursor:not-allowed}
.fmt-btn .badge{font-size:.55rem;display:block;margin-top:3px;letter-spacing:.5px;font-family:'Rajdhani',sans-serif;font-weight:700}
.fmt-btn.ok .badge{color:rgba(0,220,140,.7)}
.fmt-btn.no .badge{color:rgba(120,130,150,.4)}

/* ══ PASSWORD SCREEN ══ */
#lockScreen{
  position:fixed;inset:0;z-index:9999;
  background:#07101f;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(0,100,220,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 20%,rgba(0,180,255,.12) 0%,transparent 50%);
  display:flex;align-items:center;justify-content:center;
}
.lock-box{
  background:rgba(0,20,55,.9);
  border:1px solid rgba(0,150,255,.4);
  border-radius:24px;
  padding:48px 44px;
  width:min(420px,90vw);
  text-align:center;
  box-shadow:0 0 80px rgba(0,100,255,.2),0 30px 80px rgba(0,0,0,.5);
  animation:slideUp .4s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.lock-icon{font-size:3.5rem;margin-bottom:16px;filter:drop-shadow(0 0 16px rgba(0,200,255,.6))}
.lock-title{
  font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;
  background:linear-gradient(135deg,#00d4ff,#0077ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;
}
.lock-sub{color:rgba(0,200,255,.45);font-size:.8rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
.lock-input-wrap{position:relative;margin-bottom:16px}
.lock-input{
  width:100%;padding:14px 48px 14px 18px;
  background:rgba(0,10,35,.9);
  border:1px solid rgba(0,130,255,.35);
  border-radius:12px;color:#dff2ff;
  font-family:'Orbitron',monospace;font-size:1.1rem;
  letter-spacing:6px;text-align:center;
  outline:none;transition:all .25s;
}
.lock-input:focus{border-color:rgba(0,200,255,.7);box-shadow:0 0 20px rgba(0,150,255,.25)}
.lock-input.shake{animation:shake .35s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-10px)}
  40%{transform:translateX(10px)}
  60%{transform:translateX(-7px)}
  80%{transform:translateX(7px)}
}
.eye-btn{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:1.2rem;color:rgba(0,195,255,.5);
  transition:color .2s;padding:4px;
}
.eye-btn:hover{color:#00d4ff}
.lock-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#005ccc,#0099ff);
  border:none;border-radius:12px;color:#fff;
  font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;
  letter-spacing:4px;text-transform:uppercase;cursor:pointer;
  transition:all .3s;box-shadow:0 4px 18px rgba(0,90,255,.4);
}
.lock-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,140,255,.5)}
.lock-err{
  color:#ff5566;font-size:.75rem;letter-spacing:2px;
  text-transform:uppercase;margin-top:12px;min-height:18px;
  font-family:'Rajdhani',sans-serif;font-weight:700;
}
.lock-attempts{color:rgba(0,195,255,.35);font-size:.68rem;letter-spacing:1px;margin-top:8px;font-family:'Rajdhani',sans-serif}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     PASSWORD SCREEN
════════════════════════════════════════ -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">BN Generator</div>
    <div class="lock-sub">Enter password to continue</div>
    <div class="lock-input-wrap">
      <input class="lock-input" type="password" id="pwInput"
             placeholder="••••••••" maxlength="32"
             onkeydown="if(event.key==='Enter')checkPW()">
      <button class="eye-btn" onclick="toggleEye()" id="eyeBtn">👁</button>
    </div>
    <button class="lock-btn" onclick="checkPW()">🔓 UNLOCK</button>
    <div class="lock-err" id="lockErr"></div>
    <div class="lock-attempts" id="lockAttempts"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MAIN APP
════════════════════════════════════════ -->
<div id="app" style="display:none;width:100%;display:none;flex-direction:column;align-items:center">
  <h1>BN Mod Generator</h1>
  <p class="sub">Automatic Announcement Image Creator</p>

  <div class="wrap">
    <div class="panel">
      <div class="panel-title">⚡ Settings</div>
      <div class="field">
        <label>Mod / Pack Name</label>
        <input type="text" id="modName" placeholder="e.g. Weapons Mashup">
      </div>
      <div class="field">
        <label>Mod Download Link</label>
        <input type="text" id="modLink" placeholder="https://lootdest.org/s?...">
      </div>
      <div class="field">
        <label>Thumbnail Image (16:9)</label>
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <div class="ico">📁</div>
          <span>Click or drag & drop</span>
          <img id="thumbPreview" style="display:none">
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="onFileChange(event)">
        <div class="status-bar" id="imgStatus"></div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Label (Top Left Corner)</label>
        <div class="tags">
          <button class="tag-btn on"  data-v=""               onclick="pickTag(this)">NONE</button>
          <button class="tag-btn"     data-v="Add-Ons"        onclick="pickTag(this)">Add-Ons</button>
          <button class="tag-btn"     data-v="Texture-Pack"   onclick="pickTag(this)">Texture-Pack</button>
          <button class="tag-btn"     data-v="World-Template" onclick="pickTag(this)">World-Template</button>
          <button class="tag-btn"     data-v="Skin-Pack"      onclick="pickTag(this)">Skin-Pack</button>
          <button class="tag-btn"     data-v="Mash-Up"        onclick="pickTag(this)">Mash-Up</button>
        </div>
      </div>
      <button class="btn-gen" onclick="generate()">⚡ GENERATE</button>
      <button class="btn-dl" id="dlBtn" onclick="openModal()">⬇ DOWNLOAD</button>
    </div>

    <div class="preview">
      <div class="preview-label">Preview</div>
      <div class="placeholder" id="placeholder">Image will appear here</div>
      <canvas id="canvas"></canvas>
    </div>
  </div>
</div>

<!-- FORMAT MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="overlayClick(event)">
  <div class="modal-box">
    <div class="modal-head">
      <span>📷 Select Format</span>
      <button class="modal-close" onclick="closeModal()">✕ Close</button>
    </div>
    <div class="modal-body">
      <p class="section-label">✅ Supported Formats</p>
      <div class="format-grid">
        <button class="fmt-btn ok" onclick="dlPhoto('png')">PNG<span class="badge">Lossless · Recommended</span></button>
        <button class="fmt-btn ok" onclick="dlPhoto('jpg')">JPG<span class="badge">Web Standard</span></button>
        <button class="fmt-btn ok" onclick="dlPhoto('jpeg')">JPEG<span class="badge">Same as JPG</span></button>
        <button class="fmt-btn ok" onclick="dlPhoto('webp')">WEBP<span class="badge">Modern Web</span></button>
        <button class="fmt-btn ok" onclick="dlPhoto('bmp')">BMP<span class="badge">Raw Pixels</span></button>
        <button class="fmt-btn ok" onclick="dlPhoto('svg')">SVG<span class="badge">Vector Wrapper</span></button>
        <button class="fmt-btn ok" onclick="dlPhoto('ico')">ICO<span class="badge">256×256 Icon</span></button>
      </div>
      <p class="section-label">⚠️ Not Supported in Browser</p>
      <div class="format-grid">
        <button class="fmt-btn no">GIF<span class="badge">256 Color Limit</span></button>
        <button class="fmt-btn no">TIFF<span class="badge">Needs Library</span></button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// PASSWORD GATE
// ══════════════════════════════════════
const CORRECT = 'osas';
let attempts = 0;
const MAX_ATTEMPTS = 5;
let locked = false;
let lockTimer = null;

function checkPW(){
  if(locked) return;
  const val = document.getElementById('pwInput').value;
  if(val === CORRECT){
    document.getElementById('lockScreen').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'flex';
  } else {
    attempts++;
    const inp = document.getElementById('pwInput');
    inp.classList.remove('shake');
    void inp.offsetWidth; // reflow to restart animation
    inp.classList.add('shake');
    inp.value = '';

    const errEl = document.getElementById('lockErr');
    const attEl = document.getElementById('lockAttempts');

    if(attempts >= MAX_ATTEMPTS){
      locked = true;
      errEl.textContent = '🔒 Too many attempts. Wait 30 seconds.';
      attEl.textContent = '';
      let remaining = 30;
      const tick = setInterval(()=>{
        remaining--;
        errEl.textContent = `🔒 Locked. Try again in ${remaining}s`;
        if(remaining <= 0){
          clearInterval(tick);
          locked = false;
          attempts = 0;
          errEl.textContent = '';
          attEl.textContent = '';
        }
      }, 1000);
    } else {
      const left = MAX_ATTEMPTS - attempts;
      errEl.textContent = '✗ Wrong password';
      attEl.textContent = `${left} attempt${left===1?'':'s'} remaining`;
    }
  }
}

function toggleEye(){
  const inp = document.getElementById('pwInput');
  const btn = document.getElementById('eyeBtn');
  if(inp.type === 'password'){
    inp.type = 'text'; btn.textContent = '🙈';
  } else {
    inp.type = 'password'; btn.textContent = '👁';
  }
}

// ══════════════════════════════════════
// APP LOGIC
// ══════════════════════════════════════
let loadedImg = null;
let tagValue  = "";
let generated = false;

function pickTag(btn){
  document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); tagValue=btn.dataset.v;
}

function onFileChange(e){ if(e.target.files[0]) loadFile(e.target.files[0]); }
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='rgba(0,220,255,.85)';});
dz.addEventListener('dragleave',()=>{dz.style.borderColor='';});
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.style.borderColor='';
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')) loadFile(f);
});
function loadFile(file){
  const st=document.getElementById('imgStatus');
  st.textContent='Loading...';st.className='status-bar';
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      loadedImg=img;
      const p=document.getElementById('thumbPreview');
      p.src=ev.target.result;p.style.display='block';
      st.textContent=`✓ ${img.naturalWidth}×${img.naturalHeight}px`;st.className='status-bar ok';
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawFrame(canvas){
  const ctx=canvas.getContext('2d');
  const W=canvas.width;
  const modName=document.getElementById('modName').value.trim()||'Mod Name';
  const modLink=document.getElementById('modLink').value.trim();
  const PAD=32,TITLE_H=88;
  const IMG_W=W-PAD*2;
  const IMG_H=Math.round(IMG_W*9/16);
  const IMG_X=PAD,IMG_Y=TITLE_H+8;
  const FOOTER_H=modLink?108:88;
  const TOTAL_H=IMG_Y+IMG_H+FOOTER_H;
  canvas.height=TOTAL_H;
  ctx.clearRect(0,0,W,TOTAL_H);

  const bg=ctx.createLinearGradient(0,0,W,TOTAL_H);
  bg.addColorStop(0,'#0d2b72');bg.addColorStop(.45,'#1249a5');bg.addColorStop(1,'#0b2264');
  ctx.fillStyle=bg;rr(ctx,0,0,W,TOTAL_H,30);ctx.fill();
  const glow=ctx.createRadialGradient(W/2,TOTAL_H*.4,0,W/2,TOTAL_H*.4,W*.62);
  glow.addColorStop(0,'rgba(45,115,230,.22)');glow.addColorStop(1,'rgba(0,8,35,.28)');
  ctx.fillStyle=glow;rr(ctx,0,0,W,TOTAL_H,30);ctx.fill();
  const brd=ctx.createLinearGradient(0,0,W,TOTAL_H);
  brd.addColorStop(0,'rgba(80,195,255,.95)');brd.addColorStop(.5,'rgba(25,125,255,.55)');brd.addColorStop(1,'rgba(80,190,255,.85)');
  ctx.strokeStyle=brd;ctx.lineWidth=6;rr(ctx,3,3,W-6,TOTAL_H-6,28);ctx.stroke();
  ctx.strokeStyle='rgba(110,215,255,.17)';ctx.lineWidth=1.5;rr(ctx,15,15,W-30,TOTAL_H-30,22);ctx.stroke();

  let fs=52;
  ctx.font=`bold ${fs}px "Orbitron",monospace`;
  while(ctx.measureText(modName).width>W-80&&fs>24){fs-=2;ctx.font=`bold ${fs}px "Orbitron",monospace`;}
  ctx.fillStyle='#00d4ff';ctx.shadowColor='rgba(0,200,255,.55)';ctx.shadowBlur=16;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(modName,W/2,TITLE_H/2);
  ctx.shadowBlur=0;ctx.textBaseline='alphabetic';

  ctx.fillStyle='#000';rr(ctx,IMG_X,IMG_Y,IMG_W,IMG_H,12);ctx.fill();
  if(loadedImg){
    ctx.save();rr(ctx,IMG_X,IMG_Y,IMG_W,IMG_H,12);ctx.clip();
    const sW=loadedImg.naturalWidth,sH=loadedImg.naturalHeight;
    const sAR=sW/sH,dAR=IMG_W/IMG_H;
    let sx=0,sy=0,sw=sW,sh=sH;
    if(Math.abs(sAR-dAR)<.02){}
    else if(sAR>dAR){sw=sH*dAR;sx=(sW-sw)/2;}
    else{sh=sW/dAR;sy=(sH-sh)/2;}
    ctx.drawImage(loadedImg,sx,sy,sw,sh,IMG_X,IMG_Y,IMG_W,IMG_H);
    ctx.restore();
  } else {
    ctx.font='26px "Rajdhani",sans-serif';ctx.fillStyle='rgba(0,150,255,.35)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Upload an image',W/2,IMG_Y+IMG_H/2);ctx.textBaseline='alphabetic';
  }
  ctx.strokeStyle='rgba(80,175,255,.65)';ctx.lineWidth=3;rr(ctx,IMG_X,IMG_Y,IMG_W,IMG_H,12);ctx.stroke();

  if(tagValue){
    ctx.font='bold 21px "Orbitron",monospace';
    const tw=ctx.measureText(tagValue).width;
    const BW=tw+34,BH=36,BX=IMG_X+14,BY=IMG_Y+12;
    ctx.fillStyle='rgba(195,150,0,.95)';rr(ctx,BX-3,BY-3,BW+6,BH+6,7);ctx.fill();
    ctx.fillStyle='#110d00';rr(ctx,BX,BY,BW,BH,6);ctx.fill();
    ctx.strokeStyle='#c89900';ctx.lineWidth=2.5;rr(ctx,BX,BY,BW,BH,6);ctx.stroke();
    ctx.fillStyle='#f0c000';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(tagValue,BX+17,BY+BH/2);ctx.textBaseline='alphabetic';
  }

  const FY=IMG_Y+IMG_H;
  if(modLink){
    ctx.font='bold 22px "Rajdhani",sans-serif';
    let dl=modLink;
    while(ctx.measureText(dl).width>W-80&&dl.length>12) dl=dl.slice(0,-4)+'...';
    ctx.fillStyle='rgba(155,220,255,.65)';ctx.textAlign='center';
    ctx.fillText(dl,W/2,FY+30);
    ctx.font='bold 36px "Orbitron",monospace';
    ctx.fillStyle='#00d4ff';ctx.shadowColor='rgba(0,200,255,.55)';ctx.shadowBlur=12;
    ctx.fillText('LINK IN COMMENTS / BIO',W/2,FY+76);ctx.shadowBlur=0;
  } else {
    ctx.font='bold 36px "Orbitron",monospace';
    ctx.fillStyle='#00d4ff';ctx.shadowColor='rgba(0,200,255,.55)';ctx.shadowBlur=12;
    ctx.textAlign='center';
    ctx.fillText('LINK IN COMMENTS / BIO',W/2,FY+52);ctx.shadowBlur=0;
  }
}

function generate(){
  const canvas=document.getElementById('canvas');
  canvas.width=1080;canvas.height=1080;
  drawFrame(canvas);
  document.getElementById('placeholder').style.display='none';
  canvas.style.display='block';
  document.getElementById('dlBtn').style.display='block';
  generated=true;
}

function openModal(){
  if(!generated){alert('Click GENERATE first!');return;}
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}
function overlayClick(e){if(e.target===document.getElementById('modal'))closeModal();}

function getName(){return document.getElementById('modName').value.trim().replace(/\s+/g,'_')||'bn_mod';}
function save(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}

async function dlPhoto(fmt){
  const canvas=document.getElementById('canvas');
  const name=getName();
  if(fmt==='png'){
    canvas.toBlob(b=>save(b,`BN_${name}.png`),'image/png');
  } else if(fmt==='jpg'||fmt==='jpeg'){
    canvas.toBlob(b=>save(b,`BN_${name}.${fmt}`),'image/jpeg',.95);
  } else if(fmt==='webp'){
    const t=canvas.toDataURL('image/webp');
    if(!t.startsWith('data:image/webp')){alert('This browser does not support WEBP. Use Chrome.');return;}
    canvas.toBlob(b=>save(b,`BN_${name}.webp`),'image/webp',.95);
  } else if(fmt==='bmp'){
    save(canvasToBMP(canvas),`BN_${name}.bmp`);
  } else if(fmt==='svg'){
    const d=canvas.toDataURL('image/png');
    const s=`<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${canvas.width}" height="${canvas.height}" viewBox="0 0 ${canvas.width} ${canvas.height}"><image width="${canvas.width}" height="${canvas.height}" xlink:href="${d}"/></svg>`;
    save(new Blob([s],{type:'image/svg+xml;charset=utf-8'}),`BN_${name}.svg`);
  } else if(fmt==='ico'){
    save(await canvasToICO(canvas),`BN_${name}.ico`);
  }
}

function canvasToBMP(canvas){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const data=ctx.getImageData(0,0,W,H).data;
  const rowBytes=Math.ceil(W*3/4)*4;
  const pixSize=rowBytes*H;
  const fileSize=54+pixSize;
  const buf=new ArrayBuffer(fileSize);
  const v=new DataView(buf);
  v.setUint8(0,0x42);v.setUint8(1,0x4D);
  v.setUint32(2,fileSize,true);v.setUint32(6,0,true);v.setUint32(10,54,true);
  v.setUint32(14,40,true);v.setInt32(18,W,true);v.setInt32(22,H,true);
  v.setUint16(26,1,true);v.setUint16(28,24,true);v.setUint32(30,0,true);
  v.setUint32(34,pixSize,true);v.setInt32(38,2835,true);v.setInt32(42,2835,true);
  let off=54;
  for(let y=H-1;y>=0;y--){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      v.setUint8(off++,data[i+2]);v.setUint8(off++,data[i+1]);v.setUint8(off++,data[i]);
    }
    const pad=rowBytes-W*3;for(let p=0;p<pad;p++) v.setUint8(off++,0);
  }
  return new Blob([buf],{type:'image/bmp'});
}

async function canvasToICO(srcCanvas){
  const ic=document.createElement('canvas');ic.width=256;ic.height=256;
  ic.getContext('2d').drawImage(srcCanvas,0,0,256,256);
  const pngBlob=await new Promise(res=>ic.toBlob(res,'image/png'));
  const pngArr=new Uint8Array(await pngBlob.arrayBuffer());
  const total=6+16+pngArr.length;
  const buf=new ArrayBuffer(total);
  const v=new DataView(buf);
  v.setUint16(0,0,true);v.setUint16(2,1,true);v.setUint16(4,1,true);
  v.setUint8(6,0);v.setUint8(7,0);v.setUint8(8,0);v.setUint8(9,0);
  v.setUint16(10,1,true);v.setUint16(12,32,true);
  v.setUint32(14,pngArr.length,true);v.setUint32(18,22,true);
  new Uint8Array(buf).set(pngArr,22);
  return new Blob([buf],{type:'image/x-icon'});
}
